# License guard for this repo's Rust dependencies (bb-tui / _rust_matcher).
#
# History: this repo used to also host `receipt-core` et al. as local workspace
# members, and this allowlist existed to keep the tree that iOS's build drew
# from free of copyleft. Per repo_split_plan.md, that firewall is now structural
# instead: `receipt-core`/`receipt-image`/`ocr-paddle` live in the separate MIT
# `beanbeaver-core` repo (consumed here via a pinned git dependency), and iOS
# consumes `beanbeaver-core` directly — this repo (GPL-2.0) is no longer in
# that path at all. This allowlist is now just general license hygiene for
# desktop's own third-party Rust deps, not an App-Store-compatibility guard.

[licenses]
# Govern THIRD-PARTY dependencies only.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # NCSA (permissive, OSI-approved): libfuzzer-sys, pulled transitively by the
    # `image` crate's AVIF encoder (image -> ravif -> rav1e). Desktop-only; never
    # enters the iOS-bound receipt-core tree.
    "NCSA",
    # CDLA-Permissive-2.0 (permissive data license): webpki-root-certs, a build
    # dependency of ort-sys (ureq, used to download ONNX Runtime). Desktop-only
    # build dep; never enters receipt-core.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
unused-allowed-license = "allow"

# Skip first-party (unpublished) workspace crates — their license is set in their
# own Cargo.toml and decided by the author, not enforced against this allowlist.
private = { ignore = true }

[bans]
# Nothing banned by name yet; the license allowlist above is the active guard.

[advisories]
# Security advisories are out of scope for this guard; keep defaults.
