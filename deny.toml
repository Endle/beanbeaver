# License guard for the Rust workspace.
#
# Rationale: `receipt-core` is compiled into the iOS app, and GPLv3 (e.g. the
# beancount toolchain) conflicts with App Store distribution. beancount itself is
# a *Python* dependency cargo-deny never sees, but this allowlist is the mechanical
# guard that prevents any *copyleft Rust crate* from ever entering the tree that
# `receipt-core` (and thus the iOS binary) draws from. Only permissive licenses are
# allowed; GPL/LGPL/AGPL/MPL are absent from the list and therefore rejected.

[licenses]
# Govern THIRD-PARTY dependencies only. First-party workspace crates are ignored
# here: their licensing is a deliberate project decision, not something to police
# via allowlist. The repo is GPL-2.0, but the iOS-bound `receipt-core` is licensed
# MIT (see crates/receipt-core/LICENSE) so it is App-Store-distributable; MIT is
# GPL-compatible, so the mixed licensing within the workspace is fine.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # NCSA (permissive, OSI-approved): libfuzzer-sys, pulled transitively by the
    # `image` crate's AVIF encoder (image -> ravif -> rav1e). Desktop-only; never
    # enters the iOS-bound receipt-core tree.
    "NCSA",
    # CDLA-Permissive-2.0 (permissive data license): webpki-root-certs, a build
    # dependency of ort-sys (ureq, used to download ONNX Runtime). Desktop-only
    # build dep; never enters receipt-core.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9
unused-allowed-license = "allow"

# Skip first-party (unpublished) workspace crates — their license is set in their
# own Cargo.toml and decided by the author, not enforced against this allowlist.
private = { ignore = true }

[bans]
# Nothing banned by name yet; the license allowlist above is the active guard.

[advisories]
# Security advisories are out of scope for this guard; keep defaults.
