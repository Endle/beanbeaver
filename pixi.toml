[workspace]
channels = ["conda-forge"]
name = "beanbeaver"
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]
version = "0.1.0"

[dependencies]
python = "3.12.*"
rust = "*"

[pypi-dependencies]
beanbeaver = { path = ".", editable = true, extras = ["dev", "test"] }
fava = ">=1.27,<2"

[tasks]
bb = "bb"
fava = "fava ../../main.beancount"
ruff-check = "ruff check ."
ruff-format-check = "ruff format --check ."
mypy = "mypy --config-file pyproject.toml . --ignore-missing-imports --no-error-summary"
mypy-strict = "mypy --config-file pyproject.toml . --ignore-missing-imports --no-error-summary --disallow-untyped-defs --warn-redundant-casts --warn-unreachable"
lint = [{ task = "ruff-check" }, { task = "ruff-format-check" }, { task = "mypy" }, { task = "mypy-strict" }]
pytest-unit = "python -m pytest tests --ignore=tests/test_e2e_receipts.py"
pytest-e2e-cached = "python -m pytest tests/test_e2e_receipts.py --beanbeaver-e2e-mode cached"
pytest-e2e-live = "python -m pytest tests/test_e2e_receipts.py --beanbeaver-e2e-mode live -v"
python-editable-install = "python -m pip install -e \".[dev,test]\""
maturin-develop-native = "maturin develop"
maturin-develop = [{ task = "maturin-develop-native" }, { task = "python-editable-install" }]
test = [{ task = "maturin-develop" }, { task = "pytest-unit" }]
test-e2e-cached = [{ task = "maturin-develop" }, { task = "pytest-e2e-cached" }]
test-e2e-live = [{ task = "maturin-develop" }, { task = "pytest-e2e-live" }]
serve = "python -m beanbeaver.cli.main serve"
bb-tui = "cargo run --bin bb-tui"
