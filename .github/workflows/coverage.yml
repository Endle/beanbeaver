name: Coverage

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          PARENT_DIR="$(python -c 'from pathlib import Path; import os; print(Path(os.environ["GITHUB_WORKSPACE"]).parent)')"
          echo "PYTHONPATH=$PARENT_DIR" >> "$GITHUB_ENV"
          if [ -x "$GITHUB_WORKSPACE/.venv/bin/python" ]; then
            echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
            echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/bin/maturin" >> "$GITHUB_ENV"
          else
            echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/Scripts/python.exe" >> "$GITHUB_ENV"
            echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/Scripts/maturin.exe" >> "$GITHUB_ENV"
          fi

      - name: Install test dependencies
        shell: bash
        run: |
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install -e ".[test,dev]"
          "$VENV_MATURIN" develop

      - name: Run tests with coverage (excluding e2e)
        shell: bash
        run: |
          "$VENV_PYTHON" -m pytest tests \
            --ignore=tests/test_e2e_receipts.py \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing:skip-covered

      - name: Add coverage summary
        shell: bash
        run: |
          "$VENV_PYTHON" - <<'PY'
          import xml.etree.ElementTree as ET

          root = ET.parse("coverage.xml").getroot()
          pct = float(root.attrib["line-rate"]) * 100
          with open("coverage_summary.md", "w", encoding="utf-8") as f:
              f.write(f"## Coverage\n\nLine coverage: **{pct:.2f}%**\n")
          PY
          cat coverage_summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
