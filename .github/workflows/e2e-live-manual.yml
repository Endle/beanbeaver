name: E2E Tests (Live, Manual)

on:
  workflow_dispatch:

jobs:
  e2e-live:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          PARENT_DIR="$(python -c 'from pathlib import Path; import os; print(Path(os.environ["GITHUB_WORKSPACE"]).parent)')"
          echo "PYTHONPATH=$PARENT_DIR" >> "$GITHUB_ENV"
          if [ -x "$GITHUB_WORKSPACE/.venv/bin/python" ]; then
            echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
            echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/bin/maturin" >> "$GITHUB_ENV"
          else
            echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/Scripts/python.exe" >> "$GITHUB_ENV"
            echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/Scripts/maturin.exe" >> "$GITHUB_ENV"
          fi

      - name: Install test dependencies
        shell: bash
        run: |
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install -e ".[test,dev]"
          "$VENV_MATURIN" develop

      - name: Start OCR service
        run: |
          OCR_IMAGE="ghcr.io/endle/beanbeaver-ocr:latest"
          echo "Using OCR image: ${OCR_IMAGE}"
          docker run -d --name beanbeaver-ocr -p 8001:8000 "${OCR_IMAGE}"

      - name: Wait for OCR health
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8001/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker logs beanbeaver-ocr || true
          exit 1

      - name: Run e2e tests in live mode
        shell: bash
        run: |
          "$VENV_PYTHON" -m pytest tests/test_e2e_receipts.py --beanbeaver-e2e-mode live -v

      - name: Dump OCR logs on failure
        if: failure()
        run: docker logs beanbeaver-ocr || true

      - name: Stop OCR service
        if: always()
        run: docker rm -f beanbeaver-ocr || true
