name: Beancount Demo

on:
  push:
    branches:
      - master
      - fix_demo

jobs:
  run-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3

      - name: Configure Git identity
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Execute demo script
        run: ./demo/run_demo.sh

      - name: Scan cached receipt and emit parsed JSON
        run: pixi run --manifest-path pixi.toml bash ./demo/scan_receipt_to_json.sh

      - name: Upload parsed receipt JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: parsed-receipt-json
          path: demo/out/*.parsed.receipt.json
