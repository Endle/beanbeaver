name: Private Regression

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  private-tests:
    name: Private regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Fine-grained PAT or GitHub App token with read-only access to the
      # private test repository contents.
      PRIVATE_TESTS_TOKEN: ${{ secrets.BEANBEAVER_PRIVATE_TESTS_READ_TOKEN }}
      # Update this if the private test repository lives elsewhere.
      PRIVATE_TESTS_REPO: Endle/beanbeaver-private-test
    steps:
      - name: Validate secret configuration
        run: |
          if [ -z "${PRIVATE_TESTS_TOKEN}" ]; then
            echo "Missing secret: BEANBEAVER_PRIVATE_TESTS_READ_TOKEN" >&2
            exit 1
          fi

      - name: Check out public repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          PARENT_DIR="$(python -c 'from pathlib import Path; import os; print(Path(os.environ[\"GITHUB_WORKSPACE\"]).parent)')"
          echo "PYTHONPATH=$PARENT_DIR" >> "$GITHUB_ENV"
          if [ -x "$GITHUB_WORKSPACE/.venv/bin/python" ]; then
            echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
            echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/bin/maturin" >> "$GITHUB_ENV"
          else
            echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/Scripts/python.exe" >> "$GITHUB_ENV"
            echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/Scripts/maturin.exe" >> "$GITHUB_ENV"
          fi

      - name: Install test dependencies
        shell: bash
        run: |
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install -e ".[test,dev]"
          "$VENV_MATURIN" develop

      - name: Check out private tests
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_TESTS_REPO }}
          token: ${{ env.PRIVATE_TESTS_TOKEN }}
          path: .private-tests-src
          persist-credentials: false
          fetch-depth: 1

      - name: Stage private tests outside the repo workspace
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/beanbeaver-private-tests"
          cp -R .private-tests-src/. "${RUNNER_TEMP}/beanbeaver-private-tests/"
          rm -rf .private-tests-src

      - name: Inspect private repo layout
        shell: bash
        run: |
          set -euo pipefail
          PRIVATE_ROOT="${RUNNER_TEMP}/beanbeaver-private-tests"
          echo "Top-level entries in private repo:"
          find "${PRIVATE_ROOT}" -mindepth 1 -maxdepth 1 -printf '%f\n' | sort

      - name: Run hidden regression suite
        shell: bash
        run: |
          set -euo pipefail
          PRIVATE_ROOT="${RUNNER_TEMP}/beanbeaver-private-tests"
          "$VENV_PYTHON" -m pytest -q --maxfail=1 "${PRIVATE_ROOT}" --e2e-mode cached

      - name: Scrub private test checkout
        if: always()
        shell: bash
        run: rm -rf "${RUNNER_TEMP}/beanbeaver-private-tests"
