name: E2E Tests (Cached)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  e2e-cached:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Create virtualenv
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$GITHUB_WORKSPACE/.venv" >> "$GITHUB_ENV"
          echo "VENV_PYTHON=$GITHUB_WORKSPACE/.venv/bin/python" >> "$GITHUB_ENV"
          echo "VENV_MATURIN=$GITHUB_WORKSPACE/.venv/bin/maturin" >> "$GITHUB_ENV"
          echo "PYTHONPATH=$(dirname "$GITHUB_WORKSPACE")" >> "$GITHUB_ENV"

      - name: Install native test dependencies
        run: |
          "$VENV_PYTHON" -m pip install --upgrade pip
          "$VENV_PYTHON" -m pip install ".[test,dev]"

      - name: Build native matcher extension
        run: |
          "$VENV_MATURIN" develop

      - name: Assert native matcher backend is loaded
        env:
          BEANBEAVER_REQUIRE_RUST_MATCHER: "1"
        run: |
          "$VENV_PYTHON" -c "from beanbeaver.receipt.matcher import rust_backend_loaded; assert rust_backend_loaded()"

      - name: Run e2e tests in cached mode
        env:
          BEANBEAVER_REQUIRE_RUST_MATCHER: "1"
        run: |
          "$VENV_PYTHON" -m pytest tests/test_e2e_receipts.py --beanbeaver-e2e-mode cached
