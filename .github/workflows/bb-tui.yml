name: bb-tui

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    name: bb-tui (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3

      - name: Build native matcher extension
        run: pixi run maturin-develop-native

      - name: Run bb-tui smoke test
        if: runner.os == 'Linux'
        shell: bash
        run: |
          script -qec 'cargo run --bin bb-tui -- --quit-after-launch' /dev/null

      - name: Run bb-tui smoke test
        if: runner.os == 'macOS'
        shell: bash
        run: |
          script -q /dev/null cargo run --bin bb-tui -- --quit-after-launch

      - name: Run bb-tui smoke test
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo run --bin bb-tui -- --quit-after-launch
